version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: cv-eval-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ner-service:
    image: ner-service:latest  
    build: ./ml-service/skill-ner-bert-service
    container_name: ml-ner
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      retries: 5

  attrition-service:
    image: attrition-service:latest
    build: ./ml-services/prehire-attrition-service
    container_name: ml-attrition
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      retries: 5

volumes:
  redis_data:
